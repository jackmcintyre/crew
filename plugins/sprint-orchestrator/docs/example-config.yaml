# Example .sprint-orchestrator/config.yaml
#
# Copy to .sprint-orchestrator/config.yaml in your project root and edit.
# The orchestrator also writes this file automatically on first run via
# getOrInitConfig — this example documents the optional knobs.

# REQUIRED: where the sprint status file lives, relative to project root.
sprintStatusPath: sprint-status.yaml

# OPTIONAL: planning doc locations (BMAD v6 layout autodetects these).
# prdPath: docs/prd.md
# architecturePath: docs/architecture.md
# storiesDir: docs/stories

# Layout name for audit / reporting.
layout: custom
autoDetected: false

# OPTIONAL: when set to a positive number N, the process-backlog skill
# auto-releases stale `in_progress` claims older than N minutes at the
# start of a run. Leave unset to require manual `releaseStaleClaims`.
# force_release_stale: 60

# OPTIONAL: when true, the orchestrator opens a per-story branch before the
# dev subagent commits. Defaults to false.
# pr_per_story: false

# OPTIONAL: base branch per-story PRs are opened against. Defaults to "main".
# default_base: main

# OPTIONAL: per-story turn budget the `run-sprint` wrapper skill uses to
# compute the /goal turn cap (turn_cap = ceil(N_stories * turn_cap_per_story)).
# Defaults to 3 — matches per-story worst case under the current rework
# cap of 2.
# turn_cap_per_story: 3
