name: CI

on:
  push:
    branches: [main]
    paths:
      - "plugins/crew/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "plugins/crew/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: write

defaults:
  run:
    working-directory: plugins/crew

jobs:
  build:
    runs-on: ubuntu-latest
    # Hard ceiling — prevents a runaway integration test (or vitest worker
    # waiting on a hung child) from burning hours of CI minutes. The full
    # suite normally completes in ~5-7 minutes; 15 gives generous headroom
    # while still failing fast if something hangs. Story 5.25 retro: a
    # previous run wedged for 57 minutes after AC6b left an orphan child.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the real PR branch (not the synthetic merge commit) so
          # the auto-commit step can push back to it. For push events
          # github.head_ref is empty and falls back to github.ref (main).
          ref: ${{ github.head_ref || github.ref }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: plugins/crew/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Auto-commit rebuilt dist if dirty (PR only)
        if: github.event_name == 'pull_request'
        run: |
          if ! git diff --quiet mcp-server/dist; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add mcp-server/dist
            git commit -m "chore(ci): rebuild dist [skip ci]"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Verify committed dist/ matches fresh build (main only)
        if: github.event_name == 'push'
        run: git diff --exit-code mcp-server/dist
      - name: Run pnpm test
        run: pnpm test
        timeout-minutes: 10
