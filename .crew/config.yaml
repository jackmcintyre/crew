adapter: bmad
adapter_config:
  stories_root: _bmad-output/implementation-artifacts
plugin:
  # Dogfood layout: vitest is a direct dependency of `mcp-server`, not of the
  # workspace root `plugins/crew/`. The reviewer's `pnpm vitest -t <filter>`
  # calls need cwd to be the package that actually has vitest in its deps,
  # otherwise `pnpm exec vitest` returns ERR_PNPM_RECURSIVE_EXEC_FIRST_FAIL.
  test_cwd: plugins/crew/mcp-server
